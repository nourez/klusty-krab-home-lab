apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf-hardcover-sync
  namespace: audiobookshelf-hardcover-sync
  labels:
    app: audiobookshelf-hardcover-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf-hardcover-sync
  template:
    metadata:
      labels:
        app: audiobookshelf-hardcover-sync
    spec:
      containers:
        - name: sync
          image: ghcr.io/drallgood/audiobookshelf-hardcover-sync:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: web-ui
              containerPort: 8080
          env:
            - name: AUDIOBOOKSHELF_URL
              valueFrom:
                configMapKeyRef:
                  name: sync-config
                  key: AUDIOBOOKSHELF_URL
            - name: AUDIOBOOKSHELF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sync-secrets
                  key: AUDIOBOOKSHELF_TOKEN
            - name: HARDCOVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sync-secrets
                  key: HARDCOVER_TOKEN
            - name: SYNC_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: sync-config
                  key: SYNC_INTERVAL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      restartPolicy: Always
