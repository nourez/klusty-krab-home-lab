apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: grimmory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      nodeSelector:
        kubernetes.io/hostname: klusty-krab-node-1
      containers:
        - name: mariadb
          image: lscr.io/linuxserver/mariadb:11.4.5
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/Toronto
            - name: MYSQL_DATABASE
              value: grimmory
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: grimmory-db-secrets
                  key: DB_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-db-secrets
                  key: DB_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-db-secrets
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: mariadb-config
              mountPath: /config
          readinessProbe:
            exec:
              command: ["mariadb-admin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mariadb-admin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 45
            periodSeconds: 20
      volumes:
        - name: mariadb-config
          hostPath:
            path: /mnt/media/Grimmory/mariadb/config
            type: DirectoryOrCreate
