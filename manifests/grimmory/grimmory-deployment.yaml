apiVersion: apps/v1
kind: Deployment
metadata:
  name: grimmory
  namespace: grimmory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grimmory
  template:
    metadata:
      labels:
        app: grimmory
    spec:
      initContainers:
        - name: wait-for-mariadb
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z mariadb 3306; do echo waiting for mariadb; sleep 2; done
      containers:
        - name: grimmory
          image: grimmory/grimmory:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6060
          env:
            - name: USER_ID
              value: "1000"
            - name: GROUP_ID
              value: "1000"
            - name: TZ
              value: America/Toronto
            - name: BOOKLORE_PORT
              value: "6060"
            - name: DATABASE_URL
              value: jdbc:mariadb://mariadb:3306/grimmory
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: grimmory-db-secrets
                  key: DB_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-db-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: grimmory-data
              mountPath: /app/data
            - name: grimmory-books
              mountPath: /books
            - name: grimmory-bookdrop
              mountPath: /bookdrop
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: grimmory-data
          hostPath:
            path: /Grimmory/data
            type: DirectoryOrCreate
        - name: grimmory-books
          hostPath:
            path: /Grimmory/books
            type: DirectoryOrCreate
        - name: grimmory-bookdrop
          hostPath:
            path: /Grimmory/bookdrop
            type: DirectoryOrCreate
