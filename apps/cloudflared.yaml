apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://cloudflare.github.io/helm-charts
      chart: cloudflare-tunnel-remote
      targetRevision: 0.1.2
      helm:
        valueFiles:
          - $values/manifests/cloudflared/values.yaml
    - repoURL: git@github.com:nourez/klusty-krab-home-lab.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflared
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    # Preserve the externally managed tunnel token secret.
    - kind: Secret
      name: cloudflared
      jsonPointers:
        - /data
        - /stringData
